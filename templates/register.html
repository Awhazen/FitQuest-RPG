{% extends "base.html" %}
{% block title %}Register — FitQuest RPG{% endblock %}

{% block content %}
<div class="hero">
  <h1 class="hero-title">⚔️ FitQuest RPG</h1>
  <p class="hero-sub">Create your hero and begin your fitness legend.</p>

  <div class="card" style="width: 100%; max-width: 400px;">
    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Choose a hero name (min. 3 chars)"
          required
          autocomplete="username"
          minlength="3"
          maxlength="32"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="At least 6 characters"
          required
          autocomplete="new-password"
          minlength="6"
        />
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          placeholder="Repeat your password"
          required
          autocomplete="new-password"
          minlength="6"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
        Create Hero 🛡️
      </button>
    </form>

    <p style="text-align: center; margin-top: 1.25rem; color: var(--text-muted); font-size: 0.9rem;">
      Already have an account?
      <a href="{{ url_for('login') }}">Log in here</a>
    </p>
  </div>
</div>
{% endblock %}
