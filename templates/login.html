{% extends "base.html" %}
{% block title %}Login — FitQuest RPG{% endblock %}

{% block content %}
<div class="hero">
  <h1 class="hero-title">⚔️ FitQuest RPG</h1>
  <p class="hero-sub">Your fitness adventure awaits. Log in to continue your quest.</p>

  <div class="card" style="width: 100%; max-width: 400px;">
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your hero name"
          required
          autocomplete="username"
          maxlength="32"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
        Login ⚔️
      </button>
    </form>

    <p style="text-align: center; margin-top: 1.25rem; color: var(--text-muted); font-size: 0.9rem;">
      No account yet?
      <a href="{{ url_for('register') }}">Create one here</a>
    </p>
  </div>
</div>
{% endblock %}
